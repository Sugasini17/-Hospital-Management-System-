
<style>
#erd { padding: 1rem 0; }
#erd svg { width: 100%; height: auto; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2d2c45' : '#EEEDFE',
    primaryBorderColor: dark ? '#534AB7' : '#534AB7',
    primaryTextColor: dark ? '#c2c0b6' : '#26215C',
    secondaryColor: dark ? '#1a2e2a' : '#E1F5EE',
    tertiaryColor: dark ? '#2d2418' : '#FAEEDA',
  },
});

const diagram = `erDiagram
  PATIENTS {
    int PATIENT_ID PK
    string NAME
    int AGE
    string GENDER
    string PHONE
  }
  DOCTORS {
    int DOCTOR_ID PK
    string NAME
    string SPECIALIZATION
  }
  APPOINTMENTS {
    int APPOINTMENT_ID PK
    int PATIENT_ID FK
    int DOCTOR_ID FK
    date APPOINTMENT_DATE
    string STATUS
  }
  BILLING {
    int BILL_ID PK
    int PATIENT_ID FK
    decimal AMOUNT
    date BILL_DATE
  }
  ROOMS {
    int ROOM_ID PK
    string ROOM_TYPE
    string AVAILABILITY
  }
  ADMISSIONS {
    int ADMISSION_ID PK
    int PATIENT_ID FK
    int ROOM_ID FK
    date ADMISSION_DATE
    date DISCHARGE_DATE
  }
  MEDICINES {
    int MEDICINE_ID PK
    string NAME
    decimal PRICE
  }
  PRESCRIPTIONS {
    int PRESCRIPTION_ID PK
    int PATIENT_ID FK
    int DOCTOR_ID FK
    int MEDICINE_ID FK
    date DATE_GIVEN
  }

  PATIENTS ||--o{ APPOINTMENTS : "books"
  DOCTORS  ||--o{ APPOINTMENTS : "attends"
  PATIENTS ||--o{ BILLING      : "billed in"
  PATIENTS ||--o{ ADMISSIONS   : "admitted via"
  ROOMS    ||--o{ ADMISSIONS   : "assigned to"
  PATIENTS ||--o{ PRESCRIPTIONS : "receives"
  DOCTORS  ||--o{ PRESCRIPTIONS : "writes"
  MEDICINES ||--o{ PRESCRIPTIONS : "included in"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
